<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>测试用网页 · 多功能沙盒</title>
    <!-- 干净、现代、响应式测试页面，包含常见交互元素 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        .test-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 20, 30, 0.15);
            padding: 2rem 2.5rem;
            transition: box-shadow 0.2s;
        }

        h1 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 3px solid #e9edf4;
            padding-bottom: 1rem;
            margin-bottom: 1.8rem;
        }

        h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #64748b;
            margin-left: 0.5rem;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem 1.8rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 680px) {
            .test-container {
                padding: 1.5rem;
            }
            .grid-2col {
                grid-template-columns: 1fr;
                gap: 1.8rem;
            }
            h1 {
                font-size: 1.8rem;
                flex-wrap: wrap;
            }
        }

        .card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 1.5rem 1.5rem 1.8rem;
            border: 1px solid #eef2f6;
            transition: background 0.15s;
        }

        .card:hover {
            background: #f1f5f9;
        }

        .card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #0f172a;
        }

        .card h2 i {
            font-style: normal;
            background: #dbeafe;
            padding: 0.15rem 0.7rem;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #1d4ed8;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0.8rem 0 0.4rem;
        }

        .input-group input, 
        .input-group select {
            flex: 1 1 140px;
            padding: 0.6rem 1rem;
            border: 1px solid #d1d9e6;
            border-radius: 60px;
            font-size: 0.95rem;
            background: white;
            transition: 0.15s;
            outline: none;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn {
            display: inline-block;
            padding: 0.55rem 1.4rem;
            border-radius: 60px;
            font-weight: 500;
            border: none;
            background: #eef2f6;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.9rem;
            line-height: 1.4;
            text-align: center;
            text-decoration: none;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: #1d4ed8;
            color: white;
            box-shadow: 0 2px 6px rgba(29, 78, 216, 0.25);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(29, 78, 216, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }

        .btn-outline:hover {
            background: #e9edf4;
            border-color: #94a3b8;
        }

        .btn-success {
            background: #059669;
            color: white;
        }
        .btn-success:hover {
            background: #047857;
        }

        .output-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 1rem 1.2rem;
            margin-top: 1rem;
            border: 1px solid #e2e8f0;
            min-height: 3.8rem;
            font-size: 0.95rem;
            word-break: break-word;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        .output-box strong {
            color: #0f172a;
        }

        .color-swatch {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.5rem 0 0.2rem;
        }

        .color-swatch span {
            display: inline-block;
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 60px;
            border: 2px solid rgba(0,0,0,0.06);
            cursor: pointer;
            transition: 0.1s;
        }

        .color-swatch span:hover {
            transform: scale(1.1);
            border-color: #334155;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 0.5rem 0 0.2rem;
        }

        .slider-container input[type="range"] {
            flex: 1;
            min-width: 120px;
            height: 5px;
            background: #d1d9e6;
            border-radius: 10px;
            -webkit-appearance: none;
            appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #1d4ed8;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        .badge {
            background: #dbeafe;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e40af;
        }

        hr {
            margin: 2rem 0 1.2rem;
            border: none;
            border-top: 2px dashed #dce2ec;
        }

        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .log-area {
            background: #0b1120;
            color: #e2e8f0;
            padding: 0.9rem 1.2rem;
            border-radius: 18px;
            font-family: 'Menlo', 'Monaco', 'Cascadia Code', monospace;
            font-size: 0.85rem;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 0.6rem;
            border: 1px solid #1e293b;
        }

        .log-area .log-line {
            border-bottom: 1px solid #1e293b;
            padding: 0.2rem 0;
        }

        .log-area .log-line:last-child {
            border-bottom: none;
        }

        .inline-flex {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
        }

        .mt-1 { margin-top: 0.6rem; }
        .mb-1 { margin-bottom: 0.6rem; }
        .text-muted { color: #64748b; }
        .text-sm { font-size: 0.85rem; }

        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-right: 1rem;
            cursor: pointer;
        }

        /* 测试用 模拟加载 */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(29, 78, 216, 0.15);
            border-top-color: #1d4ed8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="test-container" id="app">
        <h1>
            🧪 测试沙盒
            <small>HTML · CSS · JS 交互</small>
        </h1>

        <!-- 两列布局：交互组件 -->
        <div class="grid-2col">
            <!-- 卡片：文本 & 按钮 -->
            <div class="card">
                <h2>🔘 点击 & 输入 <i>测试</i></h2>
                <div class="input-group">
                    <input type="text" id="textInput" placeholder="输入文字..." value="Hello 测试">
                    <button class="btn btn-primary" id="showTextBtn">显示</button>
                </div>
                <div class="output-box" id="textOutput">
                    <span class="text-muted">👆 点击按钮或按回车</span>
                </div>
                <div class="inline-flex mt-1">
                    <button class="btn btn-outline" id="clearTextBtn">清空</button>
                    <button class="btn btn-outline" id="alertBtn">弹窗测试</button>
                </div>
            </div>

            <!-- 卡片：颜色选择器 + 滑块 -->
            <div class="card">
                <h2>🎨 颜色 & 滑块 <i>动态</i></h2>
                <div class="color-swatch">
                    <span style="background:#ef4444" data-color="#ef4444"></span>
                    <span style="background:#3b82f6" data-color="#3b82f6"></span>
                    <span style="background:#10b981" data-color="#10b981"></span>
                    <span style="background:#f59e0b" data-color="#f59e0b"></span>
                    <span style="background:#8b5cf6" data-color="#8b5cf6"></span>
                    <span style="background:#ec4899" data-color="#ec4899"></span>
                </div>
                <div class="slider-container">
                    <span style="font-size:0.9rem;">尺寸</span>
                    <input type="range" id="sizeSlider" min="10" max="60" value="28">
                    <span id="sizeLabel" class="badge">28px</span>
                </div>
                <div class="output-box" id="colorOutput" style="background:#f1f5f9; transition: background 0.1s;">
                    <span id="colorValue">#3b82f6</span> · <span id="sizeValue">28px</span>
                </div>
                <button class="btn btn-outline mt-1" id="resetColorBtn">重置</button>
            </div>

            <!-- 卡片：选择器 & 计数器 -->
            <div class="card">
                <h2>📦 选择 & 计数 <i>状态</i></h2>
                <div class="input-group">
                    <select id="fruitSelect">
                        <option value="apple">🍎 苹果</option>
                        <option value="banana" selected>🍌 香蕉</option>
                        <option value="orange">🍊 橙子</option>
                        <option value="grape">🍇 葡萄</option>
                    </select>
                    <button class="btn btn-primary" id="selectBtn">选择</button>
                </div>
                <div class="output-box" id="selectOutput">
                    当前: <strong id="selectedFruitDisplay">香蕉</strong>
                </div>
                <div class="inline-flex mt-1">
                    <button class="btn btn-outline" id="countUpBtn">➕ 加</button>
                    <button class="btn btn-outline" id="countDownBtn">➖ 减</button>
                    <span class="badge" id="counterDisplay">0</span>
                </div>
            </div>

            <!-- 卡片：复选框 & 开关 -->
            <div class="card">
                <h2>⚙️ 开关 & 复选框 <i>状态</i></h2>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="check1" checked> 选项 A</label>
                    <label><input type="checkbox" id="check2"> 选项 B</label>
                    <label><input type="checkbox" id="check3"> 选项 C</label>
                </div>
                <div class="output-box" id="checkboxOutput">
                    ✅ 已选: A
                </div>
                <button class="btn btn-outline mt-1" id="toggleAllBtn">切换全部</button>
                <button class="btn btn-outline" id="uncheckAllBtn">取消全选</button>
            </div>
        </div>

        <!-- 底部：日志 / 动作区 -->
        <hr>
        <div class="footer-actions">
            <div>
                <button class="btn btn-success" id="logActionBtn">📋 记录操作</button>
                <button class="btn btn-outline" id="clearLogBtn">清空日志</button>
            </div>
            <span class="text-muted text-sm">点击任何交互都会记录</span>
        </div>

        <!-- 日志输出区域 -->
        <div class="log-area" id="logArea">
            <div class="log-line">⏳ 初始化测试环境 ...</div>
            <div class="log-line">✅ 就绪，可开始测试</div>
        </div>

        <div style="margin-top: 1.5rem; font-size: 0.8rem; color: #94a3b8; text-align: center; border-top: 1px solid #edf2f7; padding-top: 1.2rem;">
            🧪 测试用 HTML · 所有交互均在前端模拟
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- DOM 引用 ----------
            const textInput = document.getElementById('textInput');
            const showTextBtn = document.getElementById('showTextBtn');
            const textOutput = document.getElementById('textOutput');
            const clearTextBtn = document.getElementById('clearTextBtn');
            const alertBtn = document.getElementById('alertBtn');

            const colorSwatches = document.querySelectorAll('.color-swatch span');
            const sizeSlider = document.getElementById('sizeSlider');
            const sizeLabel = document.getElementById('sizeLabel');
            const colorOutput = document.getElementById('colorOutput');
            const colorValue = document.getElementById('colorValue');
            const sizeValue = document.getElementById('sizeValue');
            const resetColorBtn = document.getElementById('resetColorBtn');

            const fruitSelect = document.getElementById('fruitSelect');
            const selectBtn = document.getElementById('selectBtn');
            const selectedFruitDisplay = document.getElementById('selectedFruitDisplay');
            const countUpBtn = document.getElementById('countUpBtn');
            const countDownBtn = document.getElementById('countDownBtn');
            const counterDisplay = document.getElementById('counterDisplay');

            const check1 = document.getElementById('check1');
            const check2 = document.getElementById('check2');
            const check3 = document.getElementById('check3');
            const checkboxOutput = document.getElementById('checkboxOutput');
            const toggleAllBtn = document.getElementById('toggleAllBtn');
            const uncheckAllBtn = document.getElementById('uncheckAllBtn');

            const logArea = document.getElementById('logArea');
            const logActionBtn = document.getElementById('logActionBtn');
            const clearLogBtn = document.getElementById('clearLogBtn');

            // ---------- 状态 ----------
            let counter = 0;
            let currentColor = '#3b82f6';
            let currentSize = 28;

            // ---------- 日志工具 ----------
            function addLog(message, isAction = true) {
                const line = document.createElement('div');
                line.className = 'log-line';
                const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
                const prefix = isAction ? '🔹' : '▪️';
                line.textContent = `[${timestamp}] ${prefix} ${message}`;
                logArea.appendChild(line);
                logArea.scrollTop = logArea.scrollHeight;
                // 保留最多 50 条
                while (logArea.children.length > 50) {
                    logArea.removeChild(logArea.firstChild);
                }
            }

            // 初始化日志
            function initLog() {
                logArea.innerHTML = '';
                addLog('🧪 测试页面已加载', false);
                addLog('🟢 所有交互可正常使用', false);
            }

            // ---------- 更新颜色/尺寸显示 ----------
            function updateColorAndSize(color, size) {
                if (color) {
                    currentColor = color;
                    colorValue.textContent = color;
                    colorOutput.style.background = color;
                    // 文字颜色自适应
                    const brightness = (c) => {
                        const hex = c.replace('#', '');
                        const r = parseInt(hex.substring(0,2), 16);
                        const g = parseInt(hex.substring(2,4), 16);
                        const b = parseInt(hex.substring(4,6), 16);
                        return (r*299 + g*587 + b*114) / 1000;
                    };
                    colorOutput.style.color = brightness(color) > 140 ? '#0f172a' : '#f1f5f9';
                }
                if (size !== undefined) {
                    currentSize = size;
                    sizeLabel.textContent = size + 'px';
                    sizeValue.textContent = size + 'px';
                    // 应用到一些元素以展示效果（可以扩大输出框字体等）
                    colorOutput.style.fontSize = size + 'px';
                }
            }

            // 重置颜色尺寸
            function resetColorSize() {
                updateColorAndSize('#3b82f6', 28);
                sizeSlider.value = 28;
                addLog('🎨 重置颜色/尺寸到默认');
            }

            // ---------- 更新复选框显示 ----------
            function updateCheckboxDisplay() {
                const checked = [];
                if (check1.checked) checked.push('A');
                if (check2.checked) checked.push('B');
                if (check3.checked) checked.push('C');
                const text = checked.length ? checked.join(', ') : '无';
                checkboxOutput.innerHTML = `✅ 已选: <strong>${text}</strong>`;
                addLog(`☑️ 复选框状态更新: [${text}]`, false);
            }

            // ---------- 绑定事件 ----------
            // 1. 文本输入
            function handleShowText() {
                const val = textInput.value.trim() || '(空)';
                textOutput.innerHTML = `<strong>📝 输出:</strong> ${val}`;
                addLog(`✏️ 显示文本: “${val}”`);
            }

            showTextBtn.addEventListener('click', handleShowText);
            textInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleShowText();
                }
            });

            clearTextBtn.addEventListener('click', () => {
                textInput.value = '';
                textOutput.innerHTML = `<span class="text-muted">🧹 已清空</span>`;
                addLog('🧹 清空文本输入');
            });

            alertBtn.addEventListener('click', () => {
                alert('🧪 这是一个测试弹窗！\n所有交互工作正常。');
                addLog('⚠️ 触发了弹窗');
            });

            // 2. 颜色选择
            colorSwatches.forEach(swatch => {
                swatch.addEventListener('click', (e) => {
                    const color = swatch.dataset.color;
                    if (color) {
                        updateColorAndSize(color, currentSize);
                        addLog(`🎨 选择颜色: ${color}`);
                    }
                });
            });

            sizeSlider.addEventListener('input', (e) => {
                const val = parseInt(e.target.value, 10);
                updateColorAndSize(currentColor, val);
                addLog(`📏 调整尺寸: ${val}px`, false);
            });

            resetColorBtn.addEventListener('click', resetColorSize);

            // 3. 选择器 + 计数器
            selectBtn.addEventListener('click', () => {
                const selected = fruitSelect.options[fruitSelect.selectedIndex];
                const label = selected.text;
                const value = selected.value;
                selectedFruitDisplay.textContent = label;
                addLog(`🍉 选择了: ${label} (${value})`);
            });

            // 默认显示
            selectedFruitDisplay.textContent = fruitSelect.options[fruitSelect.selectedIndex].text;

            countUpBtn.addEventListener('click', () => {
                counter += 1;
                counterDisplay.textContent = counter;
                addLog(`📈 计数 +1 → ${counter}`);
            });

            countDownBtn.addEventListener('click', () => {
                counter -= 1;
                counterDisplay.textContent = counter;
                addLog(`📉 计数 -1 → ${counter}`);
            });

            // 4. 复选框
            [check1, check2, check3].forEach(chk => {
                chk.addEventListener('change', updateCheckboxDisplay);
            });

            toggleAllBtn.addEventListener('click', () => {
                const allChecked = check1.checked && check2.checked && check3.checked;
                const newState = !allChecked;
                check1.checked = newState;
                check2.checked = newState;
                check3.checked = newState;
                updateCheckboxDisplay();
                addLog(`🔄 切换全部复选框 → ${newState ? '全选' : '全取消'}`);
            });

            uncheckAllBtn.addEventListener('click', () => {
                check1.checked = false;
                check2.checked = false;
                check3.checked = false;
                updateCheckboxDisplay();
                addLog('⬜ 取消所有复选框');
            });

            // 5. 日志操作
            logActionBtn.addEventListener('click', () => {
                addLog('📋 手动记录操作 (用户点击)');
            });

            clearLogBtn.addEventListener('click', () => {
                logArea.innerHTML = '';
                addLog('🗑️ 日志已清空', false);
                addLog('📋 新日志会话开始', false);
            });

            // 额外：初始化显示
            function init() {
                initLog();
                // 设置默认颜色/尺寸
                updateColorAndSize('#3b82f6', 28);
                sizeSlider.value = 28;
                // 复选框初始
                updateCheckboxDisplay();
                // 计数器显示
                counterDisplay.textContent = counter;
                // 输出框占位
                textOutput.innerHTML = `<span class="text-muted">💡 输入文字后点击 “显示”</span>`;
                // 默认选择显示
                selectedFruitDisplay.textContent = fruitSelect.options[fruitSelect.selectedIndex].text;
                addLog('⚡ 测试环境初始化完成', false);
            }

            init();

            // 额外: 点击卡片上的色块会记录日志已在上面绑定, 但加一条全局说明
            // 针对可能出现的未捕获错误 友好提示
            console.log('🧪 测试页面已启动，所有交互已绑定。');
        })();
    </script>
</body>
</html>
