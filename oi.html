<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>慷慨激昂的问候</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0d11;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            /* 背景平滑过渡 */
            background-size: 400% 400%;
            transition: background 1.5s ease;
            padding: 20px;
        }

        /* 慷慨激昂的史诗感流光背景（不刺眼，但极为动感华丽） */
        @keyframes dramatic-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .epic-active {
            background: linear-gradient(125deg, #2c003e, #fe346e, #d31a50, #ffbd39, #20002c) !important;
            background-size: 300% 300% !important;
            animation: dramatic-flow 4s ease infinite !important;
        }

        /* 文本展示区域 */
        .text-container {
            text-align: center;
            margin-bottom: 50px;
            z-index: 10;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 触发特效后的文字巨震膨胀效果 */
        .text-epic {
            transform: scale(1.2);
            text-shadow: 0 0 30px rgba(254, 52, 110, 0.8), 0 0 50px rgba(255, 189, 57, 0.5);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            transition: all 0.5s;
        }

        h2 {
            font-size: 1.5rem;
            color: #a0a0b0;
            font-weight: 300;
            transition: all 0.5s;
        }

        /* 互动区域容器 */
        .interactive-wrap {
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
            transition: transform 0.1s ease-out;
        }

        .interactive-wrap.teleporting {
            position: absolute;
        }

        /* 气泡框与按钮的深度区分 */
        
        /* 1. “你好”聊天气泡（经典的微信/社交软件气泡样式） */
        .chat-bubble {
            background-color: #2f2f38;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 20px 20px 20px 5px; /* 左下角留尖，模拟对话气泡 */
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 2px solid #4e4e5a;
            position: relative;
            user-select: none;
            white-space: nowrap;
        }

        /* 2. “发送”按钮（高亮、极具点击欲的拟物渐变按钮） */
        .send-btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px; /* 椭圆药丸形状 */
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4), inset 0 2px 4px rgba(255,255,255,0.3);
            border: 2px solid #ffffff;
            transition: transform 0.1s, box-shadow 0.2s;
            white-space: nowrap;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            h2 { font-size: 1.1rem; }
            .chat-bubble, .send-btn {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="text-container" id="textContainer">
        <h1 id="mainTitle">你好</h1>
        <h2 id="subTitle">你怎么不对我说你好</h2>
    </div>

    <!-- 互动区域：气泡与按钮有着极为明显的视觉差异 -->
    <div class="interactive-wrap" id="interactiveWrap">
        <div class="chat-bubble">你好</div>
        <button class="send-btn" id="sendBtn">发送</button>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const wrap = document.getElementById('interactiveWrap');
        const textContainer = document.getElementById('textContainer');
        const mainTitle = document.getElementById('mainTitle');
        const subTitle = document.getElementById('subTitle');
        const body = document.body;

        let isFirstClick = true;
        let audio = null;

        // 这里使用的是网易云音乐的公共音频，可以换成你的《禁报》直链
        const audioSrc = "https://music.163.com/song/media/outer/url?id=1430417435.mp3"; 

        // 随机跳跃函数
        function teleport() {
            if (!wrap.classList.contains('teleporting')) {
                wrap.classList.add('teleporting');
            }

            const wrapRect = wrap.getBoundingClientRect();
            
            // 计算安全活动范围，保证完全不会飞到屏幕外面
            const maxX = window.innerWidth - wrapRect.width - 20;
            const maxY = window.innerHeight - wrapRect.height - 20;
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));
            
            wrap.style.left = `${randomX}px`;
            wrap.style.top = `${randomY}px`;
        }

        // 点击事件
        sendBtn.addEventListener('click', (e) => {
            e.stopPropagation();

            // 1. 改变背景：由阴暗的深色变成极具史诗感和冲击力的金色与玫瑰红渐变流光
            if (!body.classList.contains('epic-active')) {
                body.classList.add('epic-active');
            }

            // 2. 第一次点击时的激昂蜕变效果
            if (isFirstClick) {
                isFirstClick = false;
                
                // 顶部文字变大、变红、带上炽热发光效果
                textContainer.classList.add('text-epic');
                mainTitle.style.color = '#ffbd39';
                subTitle.style.color = '#ffffff';
                subTitle.style.fontWeight = 'bold';

                // 播放音乐
                audio = new Audio(audioSrc);
                audio.loop = true;
                audio.play().catch(err => {
                    console.log("音频播放受阻:", err);
                });
            }

            // 3. 聊天气泡和发送按钮整体在屏幕中随机疯狂跳跃
            teleport();
        });
    </script>
</body>
</html>
